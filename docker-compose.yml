services:
  postgres:
    image: postgres:17-alpine
    container_name: orion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: orion
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: orion_dev
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - orion_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion -d orion"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  orion_postgres_data:
